<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频转广告</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup-body">
  <div class="popup">
    <h1 class="popup-title">视频转广告</h1>
    <p class="popup-desc">将视频伪装成新闻资讯弹窗</p>
    <p class="popup-hint">使用说明：<br>1. 在任意视频网站播放视频<br>2. 点击"打开侧边栏"<br>3. 在原视频页点击全屏</p>
    <div class="form-group">
      <label for="sidePanelTitle">侧边栏标题：</label>
      <input type="text" id="sidePanelTitle" placeholder="输入自定义标题（留空隐藏）" maxlength="20">
    </div>
    <button id="openSidePanel" class="btn primary">打开侧边栏</button>
    <div class="popup-footer">版本号：v1.0.0<br>by忆痕，QQ：937750307</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
